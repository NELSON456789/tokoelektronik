<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'tambah'} ? 'Tambah Barang' : 'Edit Barang'">Form Barang</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="main-container" style="max-width: 600px;">
        
        <h2 th:text="${mode == 'tambah'} ? 'Tambah Barang' : 'Edit Barang'"></h2>

        <form th:action="${mode == 'tambah'} ? @{/barang/simpan} : @{/barang/update}"
              th:object="${barang}"
              method="post">

            <div>
                <label for="kodeBarang">Kode Barang</label>
                <input type="text" id="kodeBarang" th:field="*{kodeBarang}" th:readonly="${mode == 'edit'}" required>
            </div>

            <div>
                <label for="namaBarang">Nama Barang</label>
                <input type="text" id="namaBarang" th:field="*{namaBarang}" placeholder="Misal: TV Samsung 32 Inch" required>
            </div>

            <div>
                <label for="kategori">Kategori</label>
                <input type="text" id="kategori" th:field="*{kategori}" placeholder="Misal: Televisi" required>
            </div>

            <div>
                <label for="harga">Harga (Rp)</label>
                <input type="number" id="harga" th:field="*{harga}" placeholder="Hanya angka" required>
            </div>

            <div>
                <label for="stok">Jumlah Stok</label>
                <input type="number" id="stok" th:field="*{stok}" placeholder="Hanya angka" required>
            </div>

            <div style="margin-top: 12px;">
                <button type="submit" class="btn">Simpan Data</button>
                <a th:href="@{/barang}">Batal</a>
            </div>

        </form>

    </div>

</body>
</html>
